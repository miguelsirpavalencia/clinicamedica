{% extends 'base.html' %}

{% block content %}

<h2>Registrar Médico</h2>

<form method="POST">

    <div class="mb-3">

        <label>Nombre</label>

        <input type="text"
               name="nombre"
               class="form-control"
               required>

    </div>

    <div class="mb-3">

        <label>Especialidad</label>

        <input type="text"
               name="especialidad"
               class="form-control"
               required>

    </div>

    <div class="mb-3">

        <label>Teléfono</label>

        <input type="text"
               name="telefono"
               class="form-control">

    </div>

    <div class="mb-3">

        <label>Correo</label>

        <input type="email"
               name="correo"
               class="form-control">

    </div>

    <button class="btn btn-success">
        Guardar
    </button>

</form>

{% endblock %}
