{% extends 'base.html' %}

{% block content %}

<h2>Registro</h2>

<form method="POST">

    <input type="text"
           name="username"
           class="form-control mb-3"
           placeholder="Usuario">

    <input type="password"
           name="password"
           class="form-control mb-3"
           placeholder="Contraseña">

    <button class="btn btn-success">
        Registrarse
    </button>

</form>

{% endblock %}
